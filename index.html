<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRANICWORLD | Minecraft Server</title>
    <style>
        body {
            background-color: #0f0f13;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 80px 20px;
            margin: 0;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
            background: #16161f;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #232330;
        }
        h1 {
            color: #4caf50;
            font-size: 2.8em;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
        }
        p {
            color: #a0a0b0;
            font-size: 1.2em;
            margin: 5px 0;
        }
        .version {
            color: #e0e0e0;
            background: #232330;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            display: inline-block;
            margin-top: 5px;
        }
        .ip-box {
            background: #1f202c;
            padding: 18px;
            border-radius: 10px;
            margin: 30px 0 15px 0;
            border: 2px dashed #4caf50;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            position: relative;
        }
        .ip-box:hover {
            background: #252736;
            border-style: solid;
            transform: scale(1.02);
        }
        .ip-box active {
            transform: scale(0.98);
        }
        .hint {
            font-size: 0.8em;
            color: #6c6d7e;
            margin-top: 5px;
        }
        .tooltip {
            display: none;
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: #4caf50;
            color: white;
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DRANICWORLD</h1>
        <p>Добро пожаловать на наш сервер Minecraft!</p>
        <div class="version">Версия: <strong>1.21.11</strong></div>
        
        <!-- Клик по этому блоку скопирует IP -->
        <div class="ip-box" id="ipBox" onclick="copyIP()">
            <div class="tooltip" id="tooltip">IP Скопирован!</div>
            <strong id="ipText">144.124.196.94:25565</strong>
        </div>
        <p class="hint">Нажми на поле, чтобы скопировать IP-адрес</p>
    </div>

    <script>
        function copyIP() {
            const ipText = document.getElementById('ipText').innerText;
            const tooltip = document.getElementById('tooltip');
            
            // Копирование в буфер
            navigator.clipboard.writeText(ipText).then(() => {
                // Показываем плашку "Скопировано"
                tooltip.style.display = 'block';
                setTimeout(() => {
                    tooltip.style.display = 'none';
                }, 2000);
            }).catch(err => {
                console.error('Не удалось скопировать: ', err);
            });
        }
    </script>
</body>
</html>
